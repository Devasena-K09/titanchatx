<!DOCTYPE html>
<html>

<head>

<title>TitanChatX</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#020617;
color:white;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:20px 40px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
}

.logo{
font-size:28px;
font-weight:bold;
background:linear-gradient(90deg,#00eaff,#8b5cf6);
-webkit-background-clip:text;
color:transparent;
}

.links a{
margin-left:20px;
color:white;
text-decoration:none;
}

/* HERO */

header{
height:100vh;
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.9)),
url("hero.jpg");
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.hero-title{
font-size:90px;
background:linear-gradient(90deg,#00eaff,#8b5cf6);
-webkit-background-clip:text;
color:transparent;
}

button{
padding:15px 35px;
background:#00eaff;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

/* SECTIONS */

section{
max-width:1200px;
margin:auto;
padding:100px 20px;
text-align:center;
}

h2{
color:#00eaff;
}

/* CHARACTERS */

.characters{
display:flex;
gap:25px;
flex-wrap:wrap;
justify-content:center;
}

.character{
background:#0c1428;
padding:20px;
border-radius:15px;
width:260px;
box-shadow:0 0 15px #00eaff;
}

.character img{
width:100%;
}

/* GAME MODES */

.modes{
display:flex;
gap:25px;
flex-wrap:wrap;
justify-content:center;
}

.mode{
background:#0c1428;
padding:20px;
border-radius:15px;
width:250px;
}

/* SLIDER */

.slider{
width:900px;
height:500px;
margin:auto;
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
animation:slider 15s infinite;
}

.slide:nth-child(2){animation-delay:5s;}
.slide:nth-child(3){animation-delay:10s;}

@keyframes slider{

0%{opacity:0}
10%{opacity:1}
30%{opacity:1}
40%{opacity:0}
100%{opacity:0}

}

/* MAP */

#map img{
width:800px;
border-radius:15px;
}

/* STATS */

.stats{
display:flex;
gap:30px;
justify-content:center;
flex-wrap:wrap;
}

.stat{
background:#0c1428;
padding:30px;
border-radius:15px;
width:200px;
}

/* MOBILE */

.phones{
display:flex;
gap:40px;
justify-content:center;
flex-wrap:wrap;
}

.phones img{
width:250px;
}

/* POPUP FORM */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.popup-content{
background:#0c1428;
padding:20px;
border-radius:15px;
}

iframe{
border-radius:10px;
}

/* FOOTER */

footer{
padding:40px;
text-align:center;
}

</style>

</head>

<body>

<nav class="navbar">

<div class="logo">⚡ TitanChatX</div>

<div class="links">
<a href="#characters">Characters</a>
<a href="#map">Map</a>
</div>

</nav>

<header>

<h1 class="hero-title">TitanChatX</h1>

<p>Chat. Play. Dominate.</p>

<button onclick="openForm()">JOIN EARLY ACCESS</button>

</header>

<section id="characters">

<h2>Characters</h2>

<div class="characters">

<div class="character">
<img src="nova.jpg">
<h3>NOVA</h3>
</div>

<div class="character">
<img src="valkyr.jpg">
<h3>VALKYR</h3>
</div>

<div class="character">
<img src="sentinel.jpg">
<h3>SENTINEL</h3>
</div>

</div>

</section>

<section>

<h2>Gameplay Showcase</h2>

<div class="slider">

<img src="game1.jpg" class="slide">
<img src="game2.jpg" class="slide">
<img src="game3.jpg" class="slide">

</div>

</section>

<section id="map">

<h2>Battle Map</h2>

<img src="map.jpg">

</section>

<section>

<h2>Community Stats</h2>

<div class="stats">

<div class="stat">
<h3>1500+</h3>
<p>Players Waiting</p>
</div>

<div class="stat">
<h3>10+</h3>
<p>Characters</p>
</div>

<div class="stat">
<h3>3</h3>
<p>Game Modes</p>
</div>

</div>

</section>

<section>

<h2>Mobile Experience</h2>

<div class="phones">

<img src="mobile1.png">
<img src="mobile2.png">

</div>

</section>

<footer>

<p>TitanChatX © 2026</p>

</footer>

<!-- POPUP FORM -->

<div id="formPopup" class="popup">

<div class="popup-content">

<iframe
src="https://docs.google.com/forms/d/e/1FAIpQLSdk9UgkeR5-0Za4XnLcYYY1tOyCP2I0i_bjjutzjc9aNZfCkw/viewform?embedded=true" width="500" height="400" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>"

</div>

</div>

<script>

function openForm(){
document.getElementById("formPopup").style.display="flex";
}

</script>

</body>

</html>
